# 本地开发：PostgreSQL(PostGIS) + Redis
# 启动：docker compose up -d
# 连接串与 backend/.env.example 一致：postgres / postgres，库名 cosco_gd（首次启动自动建库）

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: cosco_gd_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cosco_gd
    ports:
      - "5432:5432"
    volumes:
      - cosco_gd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cosco_gd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cosco_gd_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cosco_gd_pgdata:
